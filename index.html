<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lotus Map</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <link
      href="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl@5.9.0/dist/maplibre-gl.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Lotus Map" />
    <link
      rel="apple-touch-icon"
      href="https://cdn.pixabay.com/photo/2016/09/27/02/11/lotus-1697486_960_720.png"
    />
    <link rel="manifest" href="manifest.json" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("sw.js")
            .then((reg) => console.log("SW registered"))
            .catch((err) => console.log("SW failed", err));
        });
      }
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #1a1a1a;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      /* Style the popup to match your screenshot */
      .maplibregl-popup-content {
        color: #000;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 12px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: {
          version: 8,
          sources: {
            "osm-tiles": {
              type: "raster",
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256,
              attribution:
                "© <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a> contributors",
            },
          },
          layers: [
            {
              id: "osm-tiles-layer",
              type: "raster",
              source: "osm-tiles",
              minzoom: 0,
              maxzoom: 22,
            },
          ],
        },
        center: [106.7, 10.77],
        zoom: 14,
      });

      // GPS Track Location
      const geolocate = new maplibregl.GeolocateControl({
        positionOptions: {
          enableHighAccuracy: true,
        },
        trackUserLocation: true,
        showUserHeading: true,
      });
      map.addControl(geolocate);

      // Distance Helpers
      function getDistanceInMeters(pt1, pt2) {
        const R = 6371000;
        const dLat = ((pt2[1] - pt1[1]) * Math.PI) / 180;
        const dLon = ((pt2[0] - pt1[0]) * Math.PI) / 180;
        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos((pt1[1] * Math.PI) / 180) *
            Math.cos((pt2[1] * Math.PI) / 180) *
            Math.sin(dLon / 2) *
            Math.sin(dLon / 2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function getClosestPointOnSegment(p, v, w) {
        const l2 = Math.pow(v[0] - w[0], 2) + Math.pow(v[1] - w[1], 2);
        if (l2 === 0) return v;
        const t = Math.max(
          0,
          Math.min(
            1,
            ((p[0] - v[0]) * (w[0] - v[0]) + (p[1] - v[1]) * (w[1] - v[1])) /
              l2,
          ),
        );
        return [v[0] + t * (w[0] - v[0]), v[1] + t * (w[1] - v[1])];
      }

      // Trigger geolocation on the first tap/click anywhere on the screen
      // This satisfies iOS's user-gesture requirement without needing an explicit button.
      function onFirstInteraction() {
        if ("Notification" in window && Notification.permission === "default") {
          Notification.requestPermission();
        }
        geolocate.trigger();
        document.body.removeEventListener("click", onFirstInteraction);
        document.body.removeEventListener("touchstart", onFirstInteraction);
      }
      document.body.addEventListener("click", onFirstInteraction);
      document.body.addEventListener("touchstart", onFirstInteraction, { passive: true });

      let geoPopup = null; // track auto-opened popup

      map.on("load", async () => {
        const response = await fetch("export_test.geojson");
        const data = await response.json();
        let selectedId = null;

        map.addSource("streets", {
          type: "geojson",
          data: data,
          generateId: true, // auto-assign numeric IDs for feature-state
        });

        // Build index: street name -> list of numeric feature IDs
        const nameToIds = {};
        const src = map.getSource("streets");
        data.features.forEach((f, i) => {
          const name = f.properties.name || "";
          if (!nameToIds[name]) nameToIds[name] = [];
          nameToIds[name].push(i);
        });

        map.addLayer({
          id: "streets-layer",
          type: "line",
          source: "streets",
          layout: { "line-join": "round", "line-cap": "round" },
          paint: {
            "line-color": [
              "case",
              ["boolean", ["feature-state", "selected"], false],
              "#2196F3", // Blue for detected
              "#ff0000", // Red base
            ],
            "line-width": [
              "case",
              ["boolean", ["feature-state", "selected"], false],
              12,
              8,
            ],
            "line-opacity": [
              "case",
              ["boolean", ["feature-state", "selected"], false],
              0.8,
              0.5,
            ],
          },
        });

        // Helper: Select street, show popup, and fly smoothly
        function selectStreetAndShowPopup(feature, location) {
          const name = feature.properties.name || "";

          // 1. Highlight all chunks of same name
          if (selectedId !== null) {
            selectedId.forEach((sid) =>
              map.setFeatureState(
                { source: "streets", id: sid },
                { selected: false },
              ),
            );
          }
          const ids = nameToIds[name] || [feature.id];
          ids.forEach((sid) =>
            map.setFeatureState(
              { source: "streets", id: sid },
              { selected: true },
            ),
          );
          selectedId = ids;

          // 2. Replace existing popup
          if (geoPopup) geoPopup.remove();
          const p = feature.properties;
          geoPopup = new maplibregl.Popup()
            .setLngLat(location)
            .setHTML(
              `
              <div style="font-size:14px;">
                <strong style="font-size:16px;">${p.name || "Unnamed"}</strong><br/>
                <span style="color:#555;">Type: ${p.highway}</span><br/>
                <span style="color:#555;">Surface: ${p.surface || "unknown"}</span><br/>
                <span style="color:#888; font-size:11px;">ID: ${p["@id"]}</span>
              </div>
            `,
            )
            .addTo(map);

          // 3. Smooth flyTo
          map.flyTo({
            center: location,
            duration: 900,
            curve: 1.42,
            essential: true,
          });
        }

        // Click interaction
        map.on("click", "streets-layer", (e) => {
          if (e.features.length > 0) {
            selectStreetAndShowPopup(e.features[0], e.lngLat);
          }
        });

        // Change cursor on hover
        map.on(
          "mouseenter",
          "streets-layer",
          () => (map.getCanvas().style.cursor = "pointer"),
        );
        map.on(
          "mouseleave",
          "streets-layer",
          () => (map.getCanvas().style.cursor = ""),
        );

        // Geolocate Trigger: Detect Closest Street
        let lastDetectedName = null;
        geolocate.on("geolocate", (pos) => {
          const userLngLat = [pos.coords.longitude, pos.coords.latitude];
          let minDistance = Infinity;
          let closestIdx = -1;
          let closestPoint = null;

          data.features.forEach((f, i) => {
            if (f.geometry && f.geometry.type === "LineString") {
              const coords = f.geometry.coordinates;
              for (let j = 0; j < coords.length - 1; j++) {
                const pOnSeg = getClosestPointOnSegment(
                  userLngLat,
                  coords[j],
                  coords[j + 1],
                );
                const dist = getDistanceInMeters(userLngLat, pOnSeg);
                if (dist < minDistance) {
                  minDistance = dist;
                  closestIdx = i;
                  closestPoint = pOnSeg;
                }
              }
            }
          });

          const maxRadius = 15;
          if (closestIdx >= 0 && minDistance <= maxRadius) {
            const closestFeature = data.features[closestIdx];
            const name = closestFeature.properties.name || "Unnamed";

            // Trigger unified update
            selectStreetAndShowPopup(closestFeature, closestPoint);

            // Notification (only when street name changes)
            if (name !== lastDetectedName) {
              lastDetectedName = name;
              if (
                "Notification" in window &&
                Notification.permission === "granted"
              ) {
                new Notification(`Closest: ${name}`, {
                  body: `You are walking on ${name}`,
                });
              }
            }
          }
        });

        // Auto-zoom to the data
        const bounds = new maplibregl.LngLatBounds();
        data.features.forEach((f) => {
          if (!f.geometry) return;
          let coords = [];
          if (f.geometry.type === "Point") {
            coords = [f.geometry.coordinates];
          } else if (f.geometry.type === "LineString") {
            coords = f.geometry.coordinates;
          } else if (
            f.geometry.type === "Polygon" ||
            f.geometry.type === "MultiLineString"
          ) {
            coords = f.geometry.coordinates.flat(1);
          } else if (f.geometry.type === "MultiPolygon") {
            coords = f.geometry.coordinates.flat(2);
          }
          coords.forEach((c) => bounds.extend(c));
        });
        if (!bounds.isEmpty()) {
          map.fitBounds(bounds, { padding: 40 });
        }
      });
    </script>
  </body>
</html>
