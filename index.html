<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Lotus Map</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Lotus Map" />
    <link rel="icon" type="image/x-icon" href="public/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="public/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="public/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="public/apple-touch-icon.png"
    />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />

    <!-- Using Google Fonts for Roboto Condensed. 
         Later you can host locally by replacing this with your local @font-face definition 
         and src: url('/fonts/DINPro.ttf') format('truetype'); -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- The Map is kept hidden underneath initially -->
    <div id="map"></div>

    <!-- Landing Page Overlay -->
    <div id="landing-page" class="landing-page">
      <header class="navbar">
        <div class="logo">
          <img
            src="public/logo_icon.png"
            alt="LotusMap Logo"
            width="32"
            height="32"
          />
          <span>Lotus</span
          ><span style="color: #2196f3; margin-left: -2px">Map</span>
        </div>
        <button class="cta-btn primary" onclick="enterApp()">Open Map</button>
      </header>

      <main class="hero">
        <div class="hero-content">
          <h1 class="title">Travelрџљ¶рџЏ»вЂЌвћЎпёЏwhen stories talk рџ—ЈпёЏ to you</h1>
          <p class="caption">
            Listen to historical stories behind every corner when you're on the
            go. No tour guide needed. No research required. Just walk and enjoy.
          </p>
          <button class="cta-btn primary large" onclick="enterApp()">
            Start Exploring
          </button>
        </div>
        <div class="hero-visual">
          <div class="phone-frame">
            <!-- Placeholder for GIF. Replace src with your actual gif -->
            <img
              src="public/demo.png"
              alt="App Preview"
              class="screen-content"
            />
          </div>
        </div>
      </main>

      <footer class="footer">
        <div>&copy; LotusMap 2026</div>
        <div>Proudly made in LotusHacks 2026 Hackathon by Tran Minh Tri</div>
      </footer>
    </div>

    <script type="module" src="main.js"></script>
    <script>
      // Function to transition from Landing to Map
      function enterApp() {
        const landing = document.getElementById("landing-page");
        landing.classList.add("fade-out");

        // Remove from DOM after fade animation allowing map to be clicked
        setTimeout(() => {
          landing.style.display = "none";

          // Trigger a resize on mapbox so it knows it is visible and has correct dimensions
          if (window.mapInstance) {
            window.mapInstance.resize();
          }
        }, 500);
      }
    </script>
  </body>
</html>
